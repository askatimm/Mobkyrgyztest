name: kyrgyztestapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.10.0
  pushable_button: ^0.0.4
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  firebase_core: ^4.2.1
  cloud_firestore: ^6.1.0
  flutter_markdown: ^0.7.7+1
  just_audio: ^0.10.5
  record: ^6.2.0
  path_provider: ^2.1.5
  cloud_functions: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  color: "#ffffff"
  image: assets/icon/icon_app.png
  android: true
  ios: true
  android_12:
    color: "#ffffff"
    image: assets/icon/icon_app.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
    - assets/audio/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon_app2.png"
  adaptive_icon_background: "#0B4DBA"
  adaptive_icon_foreground: "assets/icon/icon_app.png"